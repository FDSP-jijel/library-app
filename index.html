<!DOCTYPE html>
<html lang="ar">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003366">
<meta charset="UTF-8">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Library Catalog FLPS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    font-family:Arial;
    margin:40px;
    direction: rtl;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
    padding-bottom:120px;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 20px;
    border-radius:12px;
    margin-bottom:20px;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header img{
    width:85px;
    height:85px;
    border-radius:10px;
}

/* LANG */
.lang-switch{
    margin-top:10px;
}

/* SIDEBAR */
.container{
    display:flex;
    gap:25px;
}

.sidebar{
    width:340px;
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:14px;
    border:3px solid #003366;
}

/* SEARCH */
.search-input{
    position:relative;
}

.search-input span{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
}

.search-input input{
    padding:12px 35px;
}

/* TABLE */
table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border:1px solid #eee;
}

th{
    background:#003366;
    color:white;
}

/* BUTTON */
button{
    padding:10px;
    margin:5px;
    background:#003366;
    color:white;
    border:none;
    border-radius:6px;
}

/* PAGINATION */
#pagination{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    justify-content:center;
}

/* INSTALL */
#installBtn{
    position:fixed;
    top:20px;
    left:20px;
    background:#1a8f3a;
    padding:12px;
    border-radius:10px;
    display:none;
}

/* CHAT */
#chatBtn{
position:fixed;
bottom:20px;
left:20px;
background:#003366;
color:white;
padding:15px;
border-radius:50%;
cursor:pointer;
}

#chatBox{
position:fixed;
bottom:80px;
left:20px;
width:300px;
background:white;
border-radius:10px;
display:none;
flex-direction:column;
}

#chatHeader{
background:#003366;
color:white;
padding:10px;
text-align:center;
}

#chatMessages{
height:200px;
overflow:auto;
padding:10px;
}

#chatInput{
padding:10px;
border:none;
border-top:1px solid #ddd;
}

</style>
</head>

<body>

<button id="installBtn">📲 تثبيت التطبيق</button>

<!-- HEADER -->
<div class="header">
    <img src="logo.png">
    <div>
        <h2>جامعة محمد الصديق بن يحيى – جيجل</h2>
        <h3 id="title2" style="color:#1a8f3a">كلية الحقوق والعلوم السياسية</h3>

        <div class="lang-switch">
            <button onclick="setLang('ar')">AR</button>
            <button onclick="setLang('fr')">FR</button>
            <button onclick="setLang('en')">EN</button>
        </div>
    </div>
</div>

<div class="container">

<div class="sidebar">
    <div class="card">
        <img src="faculty.jpg">
        <p id="facultyText">كلية الحقوق والعلوم السياسية</p>
    </div>
</div>

<div class="main">

<h1 id="mainTitle">فهرس مكتبة الكلية</h1>

<div class="search-box">
<div class="search-input">
<span>🔍</span>
<input id="search" onkeyup="searchTable()" placeholder="ابحث...">
</div>

<input id="authorFilter" placeholder="المؤلف">
<input id="yearFilter" placeholder="السنة">
<button onclick="advancedFilter()">بحث متقدم</button>
</div>

<p id="count"></p>

<table>
<thead>
<tr>
<th onclick="sortTable('title')">العنوان</th>
<th onclick="sortTable('author')">المؤلف</th>
<th onclick="sortTable('publisher')">دار النشر</th>
<th onclick="sortTable('place')">المكان</th>
<th onclick="sortTable('edition')">الطبعة</th>
<th onclick="sortTable('year')">السنة</th>
<th onclick="sortTable('class')">التصنيف</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="prevPage()">السابق</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">التالي</button>

<div id="pagination"></div>

<button onclick="downloadExcel()">تحميل Excel</button>

</div>
</div>

<!-- CHAT -->
<div id="chatBtn">💬</div>

<div id="chatBox">
<div id="chatHeader">المساعد</div>
<div id="chatMessages"></div>
<input id="chatInput" placeholder="اكتب..." onkeypress="handleChat(event)">
</div>

<script>

let data=[],currentData=[],currentPage=1,rowsPerPage=100;

/* INSTALL */
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
let btn=document.getElementById("installBtn");
btn.style.display="block";
btn.innerText="📲 إضافة إلى الشاشة الرئيسية";

btn.onclick=async()=>{
deferredPrompt.prompt();
};
});

/* LOAD */
fetch("catalog_FDSP_jijel.csv")
.then(r=>r.text())
.then(t=>{
t.split("\n").slice(1).forEach(r=>{
let c=r.split(";");
if(c.length>=8){
data.push({title:c[1],author:c[2],publisher:c[3],place:c[5],edition:c[6],year:c[4],class:c[7]});
}
});
display(data);
});

/* DISPLAY */
function display(rows){
currentData=rows;
let max=Math.ceil(rows.length/rowsPerPage);
let start=(currentPage-1)*rowsPerPage;

document.getElementById("tbody").innerHTML=
rows.slice(start,start+rowsPerPage).map(r=>`
<tr><td>${r.title}</td><td>${r.author}</td><td>${r.publisher}</td>
<td>${r.place}</td><td>${r.edition}</td><td>${r.year}</td><td>${r.class}</td></tr>`).join("");

document.getElementById("pageInfo").innerText=`صفحة ${currentPage}/${max}`;
document.getElementById("count").innerText=`عدد الكتب: ${rows.length}`;

let p="";
for(let i=1;i<=max;i++){p+=`<button onclick="goToPage(${i})">${i}</button>`;}
document.getElementById("pagination").innerHTML=p;
}

/* FUNCTIONS */
function goToPage(p){currentPage=p;display(currentData);}
function nextPage(){currentPage++;display(currentData);}
function prevPage(){currentPage--;display(currentData);}

function searchTable(){
let q=document.getElementById("search").value.toLowerCase();
display(data.filter(r=>Object.values(r).some(v=>v?.toLowerCase().includes(q))));
}

function advancedFilter(){
let a=document.getElementById("authorFilter").value.toLowerCase();
let y=document.getElementById("yearFilter").value;
display(data.filter(r=>(!a||r.author.toLowerCase().includes(a))&&(!y||r.year.includes(y))));
}

function sortTable(k){
display([...currentData].sort((a,b)=>(a[k]||"").localeCompare(b[k]||"")));
}

function downloadExcel(){
let ws=XLSX.utils.json_to_sheet(currentData);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"catalog");
XLSX.writeFile(wb,"catalog.xlsx");
}

/* CHAT */
document.getElementById("chatBtn").onclick=()=>{
let b=document.getElementById("chatBox");
b.style.display=b.style.display==="flex"?"none":"flex";
};

function handleChat(e){
if(e.key!=="Enter")return;
let i=document.getElementById("chatInput");
let m=i.value;
addMsg("👤 "+m);
addMsg("🤖 "+reply(m));
i.value="";
}

function addMsg(t){
let b=document.getElementById("chatMessages");
b.innerHTML+=`<div>${t}</div>`;
b.scrollTop=b.scrollHeight;
}

function reply(m){
m=m.toLowerCase();
if(m.includes("بحث")) return "استعمل مربع البحث";
if(m.includes("تحميل")) return "اضغط تحميل Excel";
if(m.includes("تثبيت")) return "زر التثبيت أعلى الصفحة";
return "مرحبا! كيف أساعدك؟";
}

/* SW */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./sw.js");
}

</script>

</body>
</html>
