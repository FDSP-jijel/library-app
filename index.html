<!DOCTYPE html>
<html lang="ar">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003366">
<meta charset="UTF-8">

<title>Library Catalog</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    font-family:Arial;
    margin:40px;
    direction: rtl;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 20px;
    border-radius:12px;
    margin-bottom:20px;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header img{
    width:85px;
    height:85px;
    object-fit:contain;
    border-radius:10px;
    border:2px solid #ddd;
    background:white;
    padding:3px;
}

/* SEARCH FIX */
.search-input{
    position:relative;
    display:inline-block;
}

.search-input span{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
}

.search-input input{
    padding:12px 35px 12px 12px;
}

/* TABLE + BUTTON (بدون تغيير) */
table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    border:1px solid #eee;
    padding:10px;
    text-align:right;
}

th{
    background:#003366;
    color:white;
    cursor:pointer;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#003366;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

/* INSTALL BUTTON */
#installBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 18px;
    background:#1a8f3a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    display:none;
    z-index:999;
}

</style>

</head>

<body>

<div class="header">
    <img src="logo.png">
    <div>
        <h2>جامعة محمد الصديق بن يحيى – جيجل</h2>
        <h3 style="color:#1a8f3a">كلية الحقوق والعلوم السياسية</h3>
    </div>
</div>

<h1 style="text-align:center;">فهرس مكتبة الكلية</h1>

<div class="search-box">

    <div class="search-input">
        <span>🔍</span>
        <input type="text" id="search" onkeyup="searchTable()" placeholder="ابحث...">
    </div>

    <input type="text" id="authorFilter" placeholder="المؤلف">
    <input type="text" id="yearFilter" placeholder="السنة">
    <button onclick="advancedFilter()">بحث متقدم</button>

</div>

<p id="count"></p>

<table>
<thead>
<tr>
<th onclick="sortTable('title')">العنوان</th>
<th onclick="sortTable('author')">المؤلف</th>
<th onclick="sortTable('publisher')">دار النشر</th>
<th onclick="sortTable('place')">المكان</th>
<th onclick="sortTable('edition')">الطبعة</th>
<th onclick="sortTable('year')">السنة</th>
<th onclick="sortTable('class')">التصنيف</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<br>

<button onclick="prevPage()">السابق</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">التالي</button>

<div id="pagination"></div>

<br>

<button onclick="downloadExcel()">تحميل Excel</button>

<button id="installBtn">📲 تثبيت التطبيق</button>

<script>

let data=[], currentData=[], currentPage=1, rowsPerPage=100;
let deferredPrompt = null;

/* LOAD DATA */
fetch("catalog_FDSP_jijel.csv")
.then(res=>res.text())
.then(text=>{
text=text.replace(/^\uFEFF/,"");
const rows=text.split(/\r?\n/);

rows.slice(1).forEach(row=>{
if(!row.trim()) return;

let cols=row.split(";");
if(cols.length<8) cols=row.split("\t");

cols=cols.map(c=>c.replace(/^"|"$/g,"").trim());

if(cols.length>=8){
data.push({
title:cols[1]||"",
author:cols[2]||"",
publisher:cols[3]||"",
place:cols[5]||"",
edition:cols[6]||"",
year:cols[4]||"",
class:cols[7]||""
});
}
});

display(data);
});

/* DISPLAY */
function display(rows){
currentData=rows;

let maxPage=Math.ceil(rows.length/rowsPerPage);
if(currentPage>maxPage) currentPage=1;

let start=(currentPage-1)*rowsPerPage;
let pageRows=rows.slice(start,start+rowsPerPage);

document.getElementById("tbody").innerHTML =
pageRows.map(r=>`
<tr>
<td>${r.title}</td>
<td>${r.author}</td>
<td>${r.publisher}</td>
<td>${r.place}</td>
<td>${r.edition}</td>
<td>${r.year}</td>
<td>${r.class}</td>
</tr>`).join("");

document.getElementById("count").innerText="عدد الكتب: "+rows.length;
document.getElementById("pageInfo").innerText="صفحة "+currentPage;
}

/* SEARCH */
function searchTable(){
let q=document.getElementById("search").value.toLowerCase();

let filtered=data.filter(r=>
Object.values(r).some(v=>
v && v.toString().toLowerCase().includes(q)
));

currentPage=1;
display(filtered);
}

/* INSTALL EVENT FIX */
window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

/* INSTALL BUTTON */
document.getElementById("installBtn").addEventListener("click",()=>{
if(!deferredPrompt) return;
deferredPrompt.prompt();
deferredPrompt=null;
});

/* SW */
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
