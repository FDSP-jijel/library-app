<!DOCTYPE html>
<html lang="ar">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003366">
<meta charset="UTF-8">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
    
<title>Library Catalog</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
    font-family:Arial;
    margin:40px;
    direction: rtl;
    background:linear-gradient(to right,#eef2f3,#dfe9f3);
    padding-bottom:120px;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 20px;
    border-radius:12px;
    margin-bottom:20px;
    background:white;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header img{
    width:85px;
    height:85px;
    object-fit:contain;
    border-radius:10px;
    border:2px solid #ddd;
    background:white;
    padding:3px;
}

/* LANGUAGE */
.lang-switch{
    margin-top:10px;
    text-align:center;
}

.lang-switch button{
    padding:5px 10px;
    font-size:12px;
}

/* SIDEBAR IMAGE FIX */
.container{
    display:flex;
    gap:25px;
    align-items:flex-start;
}

.sidebar{
    width:220px;
}

.card{
    width:100%;
    padding:12px;
    box-sizing:border-box;
}

.card img{
    width:100%;
    height:280px;
    object-fit:contain;
    border-radius:14px;
    border:3px solid #003366;
    background:white;
    padding:8px;
}
  .sidebar{
    width:320px;
    flex-shrink:0;
}

    
/* SEARCH */
.search-input{
    position:relative;
    display:inline-block;
}

.search-input span{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
}

.search-input input{
    padding:12px 35px 12px 12px;
}

/* TABLE */
table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    border:1px solid #eee;
    padding:10px;
    text-align:right;
}

th{
    background:#003366;
    color:white;
    cursor:pointer;
}

/* BUTTON */
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#003366;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

/* PAGINATION */
#pagination{
    margin-top:15px;
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    justify-content:center;
}

#pagination button{
    padding:5px 10px;
    font-size:12px;
}

/* INSTALL BUTTON TOP LEFT */
#installBtn{
    position:fixed;
    top:20px;
    left:20px;
    padding:12px 18px;
    background:#1a8f3a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    display:none;
    z-index:999;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png">
    <div>
        <h2 id="title1">جامعة محمد الصديق بن يحيى – جيجل</h2>
        <h3 id="title2" style="color:#1a8f3a">كلية الحقوق والعلوم السياسية</h3>

        <div class="lang-switch">
            <button onclick="setLang('ar')">AR</button>
            <button onclick="setLang('fr')">FR</button>
            <button onclick="setLang('en')">EN</button>
        </div>
    </div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="card">
        <img src="faculty.jpg">
        <p id="facultyText">كلية الحقوق والعلوم السياسية</p>
    </div>
</div>

<div class="main">

<h1 id="mainTitle" style="text-align:center;">فهرس مكتبة الكلية</h1>

<div class="search-box">

    <div class="search-input">
        <span>🔍</span>
        <input type="text" id="search" onkeyup="searchTable()" placeholder="ابحث...">
    </div>

    <input type="text" id="authorFilter" placeholder="المؤلف">
    <input type="text" id="yearFilter" placeholder="السنة">
    <button onclick="advancedFilter()">بحث متقدم</button>

</div>

<p id="count"></p>

<table>
<thead>
<tr>
<th onclick="sortTable('title')">العنوان</th>
<th onclick="sortTable('author')">المؤلف</th>
<th onclick="sortTable('publisher')">دار النشر</th>
<th onclick="sortTable('place')">المكان</th>
<th onclick="sortTable('edition')">الطبعة</th>
<th onclick="sortTable('year')">السنة</th>
<th onclick="sortTable('class')">التصنيف</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<br>

<button onclick="prevPage()">السابق</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">التالي</button>

<div id="pagination"></div>

<br>

<button onclick="downloadExcel()">تحميل Excel</button>

</div>
</div>

<!-- INSTALL -->
<button id="installBtn">📲 تثبيت التطبيق</button>

<script>

let data=[], currentData=[], currentPage=1, rowsPerPage=100;
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const btn = document.getElementById("installBtn");
  btn.style.display = "block";

  btn.addEventListener("click", async () => {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  });
});

setTimeout(() => {
  if (!deferredPrompt) {
    document.getElementById("installBtn").style.display = "block";
    document.getElementById("installBtn").innerText = "📲 أضف إلى الشاشة الرئيسية";
    
    document.getElementById("installBtn").onclick = () => {
      alert("اضغط على ⋮ ثم اختر Ajouter à l’écran d’accueil");
    };
  }
}, 5000);
    
/* LOAD DATA */
fetch("catalog_FDSP_jijel.csv")
.then(r=>r.text())
.then(text=>{
text=text.replace(/^\uFEFF/,"");
let rows=text.split(/\r?\n/);

rows.slice(1).forEach(row=>{
if(!row.trim()) return;

let cols=row.split(";");
if(cols.length<8) cols=row.split("\t");

cols=cols.map(c=>c.replace(/^"|"$/g,"").trim());

if(cols.length>=8){
data.push({
title:cols[1]||"",
author:cols[2]||"",
publisher:cols[3]||"",
place:cols[5]||"",
edition:cols[6]||"",
year:cols[4]||"",
class:cols[7]||""
});
}
});

display(data);
});

/* DISPLAY */
function display(rows){

currentData=rows;

let maxPage=Math.ceil(rows.length/rowsPerPage);
if(currentPage>maxPage) currentPage=1;

let start=(currentPage-1)*rowsPerPage;
let pageRows=rows.slice(start,start+rowsPerPage);

document.getElementById("tbody").innerHTML =
pageRows.map(r=>`
<tr>
<td>${r.title}</td>
<td>${r.author}</td>
<td>${r.publisher}</td>
<td>${r.place}</td>
<td>${r.edition}</td>
<td>${r.year}</td>
<td>${r.class}</td>
</tr>`).join("");

document.getElementById("count").innerText="عدد الكتب: "+rows.length;

let max=Math.ceil(rows.length/rowsPerPage);
document.getElementById("pageInfo").innerText="صفحة "+currentPage+" / "+max;

let pagesHTML="";
for(let i=1;i<=max;i++){
pagesHTML+=`<button onclick="goToPage(${i})">${i}</button>`;
}
document.getElementById("pagination").innerHTML=pagesHTML;
}

/* PAGINATION */
function goToPage(p){currentPage=p;display(currentData);}
function nextPage(){if(currentPage<Math.ceil(currentData.length/rowsPerPage)){currentPage++;display(currentData);}}
function prevPage(){if(currentPage>1){currentPage--;display(currentData);}}

/* SEARCH */
function searchTable(){
let q=document.getElementById("search").value.toLowerCase();
let filtered=data.filter(r=>
Object.values(r).some(v=>v && v.toLowerCase().includes(q))
);
currentPage=1;
display(filtered);
}

/* ADVANCED */
function advancedFilter(){
let a=document.getElementById("authorFilter").value.toLowerCase();
let y=document.getElementById("yearFilter").value;

let filtered=data.filter(r=>
(!a || r.author.toLowerCase().includes(a)) &&
(!y || r.year.includes(y))
);

currentPage=1;
display(filtered);
}

/* SORT */
function sortTable(key){
let sorted=[...currentData].sort((a,b)=>
(a[key]||"").localeCompare(b[key]||"")
);
display(sorted);
}

/* LANG */
function setLang(lang){
if(lang==='fr'){
document.getElementById("mainTitle").innerText="Catalogue de la bibliothèque";
document.getElementById("facultyText").innerText="Faculté de droit et sciences politiques";
document.getElementById("title2").innerText="Faculté de droit et sciences politiques";
}
else if(lang==='en'){
document.getElementById("mainTitle").innerText="Library Catalog";
document.getElementById("facultyText").innerText="Faculty of Law and Political Science";
document.getElementById("title2").innerText="Faculty of Law and Political Science";
}
else{
location.reload();
}
}

/* EXCEL */
function downloadExcel(){
let ws=XLSX.utils.json_to_sheet(currentData);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"catalog");
XLSX.writeFile(wb,"catalog.xlsx");
}

/* INSTALL */
window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click",async()=>{
if(!deferredPrompt) return;
deferredPrompt.prompt();
deferredPrompt=null;
});

/* SW */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js", { scope: "./" });
  });
}

</script>

</body>
</html>
